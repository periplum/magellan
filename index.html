<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Magellan–Elcano Circumnavigation (1519–1522)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/gh/periplum/periplum-core@v0.3.2/dist/periplum.js" integrity="sha384-1JX16g07d5qE+6X/Yr9t0YQk/gP8Zhr3iRhsd8Rlpa5adN7HHeo6UTOxxz3NRmPk" crossorigin="anonymous"></script>
</head>
<body>
<script>
  Periplum.render({
    title: "Magellan–Elcano Circumnavigation · 1519–1522",
    dataUrl: "data.json",
    repo: "https://github.com/periplum/magellan",
    favicon: "favicon.png",
    theme: { headerBg: "#243b53", accent: "#f0b429" },
    routeLabel: "Voyage route",
    unwrapRoute: true,
    statusColors: { "Magellan": "#1f77b4", "Elcano": "#2ca02c" },
    seo: {
      description: "The first circumnavigation of the globe (1519–1522), mapped stop by stop: Ferdinand Magellan's route and Juan Sebastián Elcano's completion. Built with Periplum."
    },
    basemaps: [
      { id: "earth", name: "🌍 Earth", type: "tiles",
        tileUrl: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        attribution: "&copy; OpenStreetMap contributors",
        minZoom: 2, initialView: [0, 20], initialZoom: 2 }
    ]
  });
</script>
</body>
</html>
